{% extends "base.html" %}
{% block title %}Reset Password | CampusChain{% endblock %}
{% block content %}
<section class="card auth-card">
    <h2><i class="fa-solid fa-rotate icon"></i>Reset Password</h2>
    <p class="hint">Enter the reset token and your new password.</p>
    <form method="post" class="form-grid">
        <label><i class="fa-solid fa-key icon"></i>Reset Token
            <input type="text" name="token" required placeholder="Paste reset token" value="{{ token }}">
        </label>
        <label><i class="fa-solid fa-lock icon"></i>New Password
            <input type="password" name="password" required placeholder="New password">
        </label>
        <label><i class="fa-solid fa-lock icon"></i>Confirm Password
            <input type="password" name="confirm_password" required placeholder="Confirm password">
        </label>
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-check icon"></i>Reset Password</button>
    </form>
    <div class="auth-links">
        <a class="link" href="{{ url_for('login') }}"><i class="fa-solid fa-arrow-left icon"></i>Back to login</a>
    </div>
</section>
{% endblock %}
